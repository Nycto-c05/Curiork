kind: Deployment
apiVersion: apps/v1

metadata:
  name: nginx-deployment
  namespace: nginx

spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      # name: nginx-dep-pod, no need, the replicaSet owns this pod anyway, hence random name 
      labels:
        app: nginx

    spec:
      containers:
        - name: nginx
          image: nginx:latest 
          ports:
            - containerPort: 80
